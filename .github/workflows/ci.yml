name: CI

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: npm

      - name: Install dependencies
        env:
          PLAYWRIGHT_SKIP_BROWSER_DOWNLOAD: '1'
        run: npm ci

      - name: Sync jinba-db types
        # Fails gracefully if jinba-db is unreachable; shim is already committed
        run: npm run types:sync || true
        env:
          JINBA_DB_PATH: ''

      - name: Lint (Biome)
        run: npx biome check .

      - name: Typecheck
        run: npx tsc --noEmit

      - name: Test
        run: npx vitest run --coverage
        env:
          # Stub env for tests — real values not needed since tests use mocks
          SUPABASE_URL: 'https://placeholder.supabase.co'
          SUPABASE_SERVICE_ROLE_KEY: 'placeholder-service-role-key-at-least-20-chars'
          REDIS_URL: 'redis://localhost:6379'
          NODE_ENV: test
          LOG_LEVEL: silent

      - name: Upload coverage
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage
          path: coverage/
          retention-days: 7
