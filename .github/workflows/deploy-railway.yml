name: Deploy (Railway)

# Only deploy after the CI workflow succeeds on main.
# workflow_run is GitHub's cross-workflow dependency mechanism.
on:
  workflow_run:
    workflows: [CI]
    branches: [main]
    types: [completed]

jobs:
  deploy:
    runs-on: ubuntu-24.04
    # Skip if CI did not succeed.
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Install Railway CLI
        run: npm i -g @railway/cli@latest

      - name: Deploy to Railway
        env:
          # REQUIRED: create this in Railway → Account → Tokens
          # Add to GitHub: Settings → Secrets and variables → Actions → RAILWAY_TOKEN
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
        run: railway up --service jinba-scraper --ci
